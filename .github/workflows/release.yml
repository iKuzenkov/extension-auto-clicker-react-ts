name: Release

on:
  release:
    types:
      - published

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Create ZIP archive
        run: |
          cd dist
          zip -r ../safe-auto-clicker-${{ github.event.release.tag_name }}.zip .

      - name: Upload ZIP to Release
        uses: softprops/action-gh-release@v2
        with:
          files: safe-auto-clicker-${{ github.event.release.tag_name }}.zip